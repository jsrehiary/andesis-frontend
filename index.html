<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Monitoring Jemuran IoT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

    <div class="container py-5">

        <div class="text-center mb-4">

            <h1 class="fw-bold text-uppercase">
                Sistem Monitoring Jemuran
            </h1>

            <!-- <p class="text-secondary">
                Monitoring realtime menggunakan ESP32-C3 dan Sensor Hujan
            </p>

            <span class="badge bg-success">
                🟢 LIVE
            </span> -->

        </div>

        <div class="card bg-dark border-0 rounded-4 p-4 shadow">

            <div class="row g-3 mb-4">

                <div class="col-md-6">

                    <div class="card border-0 rounded-4 h-100">

                        <div class="card-body">

                            <div class="text-muted fs-6 mb-2">
                                Nilai Sensor
                            </div>

                            <div id="sensor" class="display-4 fw-bold">
                                -
                            </div>

                            <div id="updated" class="text-secondary small mt-2">
                                -
                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="card bg-secondary border-0 rounded-4 h-100">

                        <div class="card-body">

                            <div class="text-muted fs-6 mb-2">
                                Status Cuaca
                            </div>

                            <div id="status" class="mt-3">
                                Loading...
                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <div id="chartCard" class="card bg-secondary border-0 rounded-4 mb-4 d-none">

                <div class="card-body">

                    <h5 class="mb-3">
                        Grafik Intensitas Hujan
                    </h5>

                    <canvas id="sensorChart"></canvas>

                </div>

            </div>

            <div class="table-responsive rounded-4 shadow-lg">

                <table class="table table-hover align-middle mb-0">

                    <thead>

                        <tr>
                            <th>No</th>
                            <!-- <th>Nilai Sensor</th> -->
                            <th>Status</th>
                            <th>Timestamp</th>
                        </tr>

                    </thead>

                    <tbody id="historyTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script>

        const API_URL =
            "https://andesis-backend-production.up.railway.app";

        

        let previousStatus = null;

        function getBadge(status) {
            if (status === "Hujan") {
                return `
        <span class="badge bg-danger fs-6">
            🌧 Hujan
        </span>`;
            }

            if (status === "Gerimis") {
                return `
        <span class="badge bg-warning text-dark fs-6">
            🌦 Gerimis
        </span>`;
            }

            return `
    <span class="badge bg-success fs-6">
        ☀ Tidak Hujan
    </span>`;
        }

        async function loadDashboard() {
            const res =
                await fetch(
                    `${API_URL}/api/status`
                );

            const latest =
                await res.json();

            document.getElementById(
                "sensor"
            ).innerText =
                latest.sensor_value;

            document.getElementById(
                "status"
            ).innerHTML =
                getBadge(
                    latest.weather_status
                );

            document.getElementById(
                "updated"
            ).innerText =
                new Date(
                    latest.recorded_at
                ).toLocaleString("id-ID");

            if (
                previousStatus &&
                previousStatus !== "Hujan" &&
                latest.weather_status === "Hujan"
            ) {
                Swal.fire({
                    icon: "warning",
                    title: "⚠ Hujan Terdeteksi",
                    text: "Segera angkat jemuran!",
                    confirmButtonText: "OK"
                });
            }

            previousStatus =
                latest.weather_status;
        }

        async function loadHistory() {
            const res =
                await fetch(
                    `${API_URL}/api/history`
                );

            const data =
                await res.json();

            const tbody =
                document.getElementById(
                    "historyTable"
                );

            tbody.innerHTML = "";

            if (!data.length) {
                tbody.innerHTML = `
        <tr class="empty-row">
            <td colspan="4">
                Belum ada data sensor. Tunggu beberapa saat lalu coba lagi.
            </td>
        </tr>
        `;
                
                return;
            }

            data.forEach(
                (item, index) => {
                    tbody.innerHTML += `
            <tr>
                <td>${data.length - index}</td>
                <!-- <td>${item.sensor_value}</td> -->
                <td>
                    ${getBadge(
                        item.weather_status
                    )}
                </td>
                <td>
                    ${new Date(
                        item.recorded_at
                    ).toLocaleString(
                        "id-ID"
                    )}
                </td>
            </tr>
            `;
                }
            );

            
        }

        

        async function refresh() {
            try {
                await loadDashboard();
                await loadHistory();
            }
            catch (err) {
                console.error(err);
            }
        }

        refresh();

        setInterval(
            refresh,
            5000
        );

    </script>

</body>

</html>
